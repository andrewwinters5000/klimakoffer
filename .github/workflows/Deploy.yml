name: Build and Deploy
on:
  push:
    branches:
      - main
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        persist-credentials: false
    - name: Compile LaTeX documents
      uses: xu-cheng/latex-action@v4
      with:
        work_in_root_file_dir: true
        root_file: |
          latex/milestone-1/main.tex
          latex/milestone-2/main.tex
          latex/milestone-3/main.tex
          latex/milestone-4/main.tex
          latex/milestone-5/main.tex
          latex/milestone-6/main.tex
          latex/schedule.tex
    - name: Copy generated PDF files
      run: |
        for i in {1..6}; do
          cp "latex/milestone-$i/main.pdf" "website/_assets/milestone$i/description.pdf"
        done
        cp "latex/schedule.pdf" "website/_assets/schedule.pdf"
    # NOTE: Python is necessary for the pre-rendering (minification) step
    - name: Install python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    # NOTE: Here you can install dependencies such as matplotlib if you use
    # packages such as PyPlot.
    # - run: pip install matplotlib
    - name: Install Julia
      uses: julia-actions/setup-julia@v1
      with:
        version: '1' # Latest stable Julia release.
    - uses: julia-actions/cache@v2
    # NOTE
    #   The steps below ensure that NodeJS and Franklin are loaded then it
    #   installs highlight.js which is needed for the prerendering step
    #   (code highlighting + katex prerendering).
    #   Then the environment is activated and instantiated to install all
    #   Julia packages which may be required to successfully build your site.
    #   The last line should be `optimize()` though you may want to give it
    #   specific arguments, see the documentation or ?optimize in the REPL.
    - run: cd website && julia --project=@. -e '
            using Pkg; Pkg.instantiate();
            using NodeJS; run(`$(npm_cmd()) install highlight.js`);
            using Franklin;
            optimize()'
    - name: Build and Deploy
      uses: JamesIves/github-pages-deploy-action@releases/v3
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRANCH: gh-pages
        FOLDER: website/__site
